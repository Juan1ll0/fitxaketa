<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!-- PWA en iOS: necesario para que "Añadir a pantalla de inicio" abra en modo
		     standalone (sin barras de Safari) en vez de en una pestaña del navegador. -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Fitxaketa" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<meta name="theme-color" content="#0f172a" />
		<!-- Pantalla de carga: estilos inline (colores de la app) para que se vea
		     bien antes de que cargue el CSS y monte el cliente (ssr=false). La quita
		     el layout raíz en onMount. -->
		<style>
			#app-loading {
				position: fixed;
				inset: 0;
				z-index: 50;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 1rem;
				background: #0f172a;
				color: #94a3b8;
				font-family: 'Inter', system-ui, sans-serif;
			}
			/* Pre-aplica el reset del preflight de Tailwind (box-sizing/margin) para
			   que el loader no "salte" de tamaño cuando cargue app.css. */
			#app-loading * {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			#app-loading .spinner {
				box-sizing: border-box;
				width: 2.5rem;
				height: 2.5rem;
				border: 3px solid #334155;
				border-top-color: #3b82f6;
				border-radius: 9999px;
				animation: app-loading-spin 0.8s linear infinite;
			}
			@keyframes app-loading-spin {
				to {
					transform: rotate(360deg);
				}
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app-loading" aria-hidden="true">
			<div class="spinner"></div>
			<p>Cargando…</p>
		</div>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
